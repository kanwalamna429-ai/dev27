<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | dev27</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-login-page">

<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-text">dev<span>27</span></div>
    <p class="login-tagline">Content Management System</p>
  </div>

  <h1 class="login-title">Sign In to Admin</h1>

  <div class="login-error" id="login-error"></div>

  <form id="login-form" class="admin-form" novalidate>
    <div class="form-group">
      <label class="form-label" for="email">Email Address <span class="required">*</span></label>
      <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password <span class="required">*</span></label>
      <div style="position:relative">
        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" id="toggle-password" style="position:absolute;right:.875rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem" aria-label="Show password">👁</button>
      </div>
    </div>
    <button type="submit" class="btn btn--primary btn--lg" id="login-btn" style="width:100%;justify-content:center;margin-top:.5rem">
      <span id="login-btn-text">Sign In</span>
      <span id="login-spinner" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="animation:spin .7s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
      </span>
    </button>
  </form>

  <div style="margin-top:1.5rem;text-align:center">
    <a href="/" style="color:var(--text-muted);font-size:.9rem">← Back to website</a>
  </div>

  <!-- Config warning -->
  <div id="config-warning" style="display:none;margin-top:1.5rem;padding:.875rem 1rem;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:8px;font-size:.85rem;color:#D97706">
    ⚠️ Supabase not configured. Edit <code>js/config.js</code> with your Supabase URL and anon key.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  // Show warning if not configured
  if (!isConfigured()) {
    document.getElementById('config-warning').style.display = 'block';
  }

  // Check if already logged in
  const session = await DEV27_AUTH.getSession();
  if (session) {
    window.location.href = '/admin/index.html';
    return;
  }

  const form = document.getElementById('login-form');
  const errorEl = document.getElementById('login-error');
  const loginBtn = document.getElementById('login-btn');
  const btnText = document.getElementById('login-btn-text');
  const spinner = document.getElementById('login-spinner');

  // Toggle password visibility
  document.getElementById('toggle-password').addEventListener('click', () => {
    const pwInput = document.getElementById('password');
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password.';
      errorEl.style.display = 'block';
      return;
    }

    loginBtn.disabled = true;
    btnText.textContent = 'Signing in...';
    spinner.style.display = 'inline-flex';
    errorEl.style.display = 'none';

    const { error } = await DEV27_AUTH.login(email, password);
    if (error) {
      errorEl.textContent = error.message || 'Invalid email or password. Please try again.';
      errorEl.style.display = 'block';
      loginBtn.disabled = false;
      btnText.textContent = 'Sign In';
      spinner.style.display = 'none';
    }
  });
});
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
