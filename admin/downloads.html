<div class="admin-main">
  <header class="admin-header">
    <button class="admin-header__toggle" id="sidebar-toggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1 class="admin-header__title">Downloads</h1>
    <div class="admin-header__actions">
      <button class="theme-toggle" data-theme-toggle style="width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer"><span class="theme-icon">🌙</span></button>
      <a href="/admin/download-editor.html" class="btn btn--primary">+ New Download</a>
    </div>
  </header>
  <div class="admin-content">
    <div class="admin-table-wrap">
      <div class="admin-table-toolbar">
        <input type="search" id="dl-search" class="admin-search-input" placeholder="Search downloads…">
        <select id="status-filter" class="admin-select">
          <option value="">All Status</option>
          <option value="published">Published</option>
          <option value="draft">Draft</option>
        </select>
        <span class="table-count" id="dl-count"></span>
      </div>
      <div id="dl-table-container">
        <div style="text-align:center;padding:3rem;color:var(--text-muted)"><div class="spinner" style="margin:0 auto 1rem"></div>Loading downloads…</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin-common.js"></script>
<script>
let allDownloads = [];
const renderTable = (items) => {
  const container = document.getElementById('dl-table-container');
  document.getElementById('dl-count').textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
  if (!items.length) {
    container.innerHTML = `<div class="table-empty"><div class="table-empty-icon">📦</div><p>No downloads found. <a href="/admin/download-editor.html">Add your first download</a></p></div>`;
    return;
  }
  container.innerHTML = `
    <table class="admin-table">
      <thead><tr><th>Image</th><th>Title</th><th>Status</th><th>Type</th><th>Downloads</th><th>Timer</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody>${items.map(d => `
        <tr>
          <td>${d.featured_image ? `<img src="${d.featured_image}" class="table-thumb" alt="">` : `<div class="table-thumb-placeholder">📦</div>`}</td>
          <td><div class="table-title">${d.title}<small>${d.slug}</small></div></td>
          <td><span class="badge badge--${d.status}">${d.status}</span></td>
          <td style="color:var(--text-muted);font-size:.875rem">${d.file_type || '—'}</td>
          <td style="color:var(--text-muted);font-size:.875rem">${(d.download_count || 0).toLocaleString()}</td>
          <td><span class="badge badge--${d.timer_enabled ? 'published' : 'draft'}">${d.timer_enabled ? `${d.timer_duration}s × ${d.timer_steps}` : 'Off'}</span></td>
          <td style="color:var(--text-muted);font-size:.875rem;white-space:nowrap">${DEV27_ADMIN.formatDate(d.created_at)}</td>
          <td class="table-actions">
            <a href="/admin/download-editor.html?id=${d.id}" class="btn btn--secondary btn--sm">Edit</a>
            <a href="/download.html?slug=${d.slug}" target="_blank" class="btn btn--ghost btn--sm">View</a>
            <button class="btn btn--danger btn--sm" onclick="deleteDl('${d.id}', '${d.title.replace(/'/g,"\\'")}')">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
};
const deleteDl = async (id, title) => {
  const ok = await DEV27_ADMIN.confirm(`Delete "<strong>${title}</strong>"? This cannot be undone.`, 'Delete Download');
  if (!ok) return;
  const sb = getSupabase();
  const { error } = await sb.from('downloads').delete().eq('id', id);
  if (error) { DEV27_ADMIN.toast('Error: ' + error.message, 'error'); return; }
  DEV27_ADMIN.toast('Download deleted');
  allDownloads = allDownloads.filter(d => d.id !== id);
  applyFilters();
};
const applyFilters = () => {
  const q = document.getElementById('dl-search').value.toLowerCase();
  const status = document.getElementById('status-filter').value;
  let f = allDownloads;
  if (q) f = f.filter(d => d.title.toLowerCase().includes(q) || d.slug.includes(q));
  if (status) f = f.filter(d => d.status === status);
  renderTable(f);
};
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('admin-overlay').addEventListener('click', () => { document.getElementById('admin-sidebar').classList.remove('open'); document.getElementById('admin-overlay').classList.remove('visible'); });
  document.getElementById('sidebar-toggle').addEventListener('click', () => { document.getElementById('admin-sidebar').classList.toggle('open'); document.getElementById('admin-overlay').classList.toggle('visible'); });
  document.getElementById('logout-btn').addEventListener('click', DEV27_AUTH.logout);
  const user = await DEV27_AUTH.getUser();
  if (!user) return;
  document.getElementById('admin-user').textContent = user.email;
  document.getElementById('user-avatar').textContent = user.email[0].toUpperCase();
  const sb = getSupabase();
  if (!sb) return;
  const { data, error } = await sb.from('downloads').select('*').order('created_at', { ascending: false });
  if (error) { document.getElementById('dl-table-container').innerHTML = `<div class="table-empty"><p>Error: ${error.message}</p></div>`; return; }
  allDownloads = data || [];
  renderTable(allDownloads);
  document.getElementById('dl-search').addEventListener('input', applyFilters);
  document.getElementById('status-filter').addEventListener('change', applyFilters);
});
</script>
</body>
</html>
