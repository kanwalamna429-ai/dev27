<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | dev27</title>
  <meta name="description" content="Read the latest articles on dev27.">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div id="code-inject-head"></div>

<header class="site-header" id="site-header">
  <div class="container">
    <a href="/" class="site-logo">dev<span>27</span></a>
    <nav class="site-nav" id="site-nav">
      <div id="header-nav"></div>
    </nav>
    <div class="header-actions">
      <button class="search-trigger" id="search-trigger" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
        <span class="theme-icon">🌙</span>
      </button>
      <button class="hamburger" id="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<div class="search-overlay" id="search-overlay">
  <div class="search-overlay-inner">
    <div class="search-overlay-box">
      <input type="search" id="search-overlay-input" placeholder="Search posts...">
      <button id="search-overlay-btn">Search</button>
    </div>
  </div>
  <button class="search-close" id="search-close">✕</button>
</div>

<main>
  <!-- Category Hero -->
  <div class="category-hero">
    <div class="container">
      <h1 id="cat-name">Blog</h1>
      <p>Discover tutorials, guides, and developer resources</p>
    </div>
  </div>

  <!-- Category Nav -->
  <div class="container" style="padding-top:0">
    <div class="categories-nav" id="categories-nav">
      <a href="/category.html" class="cat-chip" id="cat-all">All Posts</a>
      <!-- Categories populated by JS -->
    </div>
  </div>

  <section class="posts-section" style="padding-top:.75rem">
    <div class="container">
      <div id="before-content-ad" data-ad="before_content"></div>
      <div class="content-with-sidebar">
        <div>
          <div class="posts-grid" id="posts-grid">
            <!-- Posts loaded by JS -->
          </div>
          <div id="pagination"></div>
        </div>
        <aside class="sidebar">
          <div class="sidebar-widget">
            <h3 class="sidebar-widget__title">Search</h3>
            <form class="sidebar-search" action="/search.html" method="get">
              <input type="search" name="q" placeholder="Search..." class="form-input" aria-label="Search">
              <button type="submit" class="btn btn--primary">Go</button>
            </form>
          </div>
          <div class="sidebar-widget" style="padding:.5rem">
            <div data-ad="sidebar"></div>
          </div>
          <div class="sidebar-widget">
            <h3 class="sidebar-widget__title">Categories</h3>
            <ul id="sidebar-categories" class="footer-nav-list"></ul>
          </div>
          <div class="sidebar-widget">
            <h3 class="sidebar-widget__title">Recent Posts</h3>
            <ul id="sidebar-recent" class="sidebar-recent"></ul>
          </div>
        </aside>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <div style="padding:1.5rem 0 0;text-align:center" data-ad="footer"></div>
    <div class="footer-main">
      <div class="footer-brand">
        <a href="/" class="footer-logo">dev<span>27</span></a>
        <p class="footer-tagline" data-site-tagline>Templates, Themes &amp; Dev Resources</p>
      </div>
      <div class="footer-col">
        <h4 class="footer-col__title">Navigation</h4>
        <ul class="footer-nav-list" id="footer-nav"></ul>
      </div>
    </div>
    <div class="footer-bottom">
      <p class="footer-copy">© <span id="footer-year"></span> <span data-site-name>dev27</span>. All rights reserved.</p>
    </div>
  </div>
</footer>
<div id="code-inject-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/supabase-client.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/seo.js"></script>
<script src="/js/ads.js"></script>
<script src="/js/menu.js"></script>
<script src="/js/blog.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('footer-year').textContent = new Date().getFullYear();
  const header = document.getElementById('site-header');
  window.addEventListener('scroll', () => header.classList.toggle('scrolled', window.scrollY > 10), { passive: true });
  document.getElementById('search-trigger').addEventListener('click', () => document.getElementById('search-overlay').classList.add('open'));
  document.getElementById('search-close').addEventListener('click', () => document.getElementById('search-overlay').classList.remove('open'));
  document.getElementById('search-overlay-btn').addEventListener('click', () => { const q = document.getElementById('search-overlay-input').value.trim(); if (q) window.location.href = `/search.html?q=${encodeURIComponent(q)}`; });

  await DEV27_BLOG.loadCategory();
  await DEV27_BLOG.loadSidebar();

  // Populate category nav
  const sb = getSupabase();
  const nav = document.getElementById('categories-nav');
  const currentCat = new URLSearchParams(window.location.search).get('cat');
  if (sb && nav) {
    const { data } = await sb.from('categories').select('name, slug').order('name');
    if (data) {
      const catChips = data.map(c => `<a href="/category.html?cat=${c.slug}" class="cat-chip ${c.slug === currentCat ? 'active' : ''}">${c.name}</a>`).join('');
      nav.innerHTML = `<a href="/category.html" class="cat-chip ${!currentCat ? 'active' : ''}">All Posts</a>` + catChips;
    }
  }
});
</script>
</body>
</html>
